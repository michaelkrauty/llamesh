# =============================================================================
# llamesh Cookbook (Model Definitions)
# =============================================================================
# Models are requested via: POST /v1/chat/completions { "model": "name:profile" }
# If profile is omitted, the "default" profile is used.
#
# llama_server_args is a shell-style string. Quote args with spaces:
#   llama_server_args: "-c 4096 --api-key 'secret key'"
#
# Minimal profile (only required fields):
#   - id: "default"
#     model_path: "./models/my-model.gguf"
#     llama_server_args: ""
#
# Profile defaults:
#   enabled: true                    # set false to hide/disable one profile
#   idle_timeout_seconds: 300        # 5 minutes
#   startup_timeout_seconds: 60      # 60s local, 3600s for HF downloads
#   max_instances: (from model_defaults)
#   max_queue_size: (from model_defaults.max_queue_size_per_model)
#   estimated_vram_mb: unset         # optional cold-start admission hint
#   estimated_sysmem_mb: unset       # optional cold-start admission hint
#
# NOTE: The proxy parses context_size, batch size, etc. from llama-server's
# startup log. Use llama_server_args to configure -c, -b, -n if needed.
# Args -m, --host, --port are added automatically by the proxy.

models:
  # ---------------------------------------------------------------------------
  # Local model with multiple profiles
  # ---------------------------------------------------------------------------
  - name: "gpt-oss-20b"
    description: "General-purpose 20B model"
    enabled: true                    # default: true
    profiles:
      - id: "fast"
        description: "Lower context, higher throughput"
        model_path: "./models/gpt-oss-20b-q4_K_M.gguf"
        idle_timeout_seconds: 600    # default: 300
        startup_timeout_seconds: 60  # default: 60 local, 3600 HF
        max_instances: 4             # 0=disabled, omit=use model_defaults
        max_queue_size: 128          # optional, per-profile queue limit
        max_wait_in_queue_ms: 45000  # optional, overrides model_defaults
        max_request_duration_ms: 0   # 0=unlimited
        # Optional static estimates used until llamesh learns measured peaks.
        # estimated_vram_mb: 12000
        # estimated_sysmem_mb: 8192
        llama_server_args: "--alias gpt-oss-20b-fast -c 32768 -b 2048 -fa on --kv-unified"

      - id: "quality"
        enabled: true                 # default: true
        description: "Larger context, more careful settings"
        model_path: "./models/gpt-oss-20b-q6_K.gguf"
        idle_timeout_seconds: 900
        max_instances: 2
        llama_server_args: "--alias gpt-oss-20b-quality -c 131072 -b 1024 -fa on --kv-unified"

      # Keep alternate profiles in the cookbook without advertising or serving them.
      # - id: "experimental"
      #   enabled: false
      #   model_path: "./models/gpt-oss-20b-q4_K_M.gguf"
      #   llama_server_args: "--alias gpt-oss-20b-experimental -c 65536"

  # ---------------------------------------------------------------------------
  # Vision-language model
  # ---------------------------------------------------------------------------
  - name: "qwen3-vl-8b"
    description: "Vision-language model"
    profiles:
      - id: "default"
        model_path: "./models/qwen3-vl-8b-q4_K_M.gguf"
        idle_timeout_seconds: 600
        max_instances: 3
        llama_server_args: "--alias qwen3-vl-8b -c 262144 -b 1024 -fa on --kv-unified --mmproj ./models/qwen3-vl-8b-mmproj.gguf"

  # ---------------------------------------------------------------------------
  # Hugging Face model (auto-download)
  # ---------------------------------------------------------------------------
  - name: "qwen2.5-0.5b"
    description: "Small model from Hugging Face"
    profiles:
      - id: "default"
        hf_repo: "ggml-org/Qwen2.5-0.5B-Instruct-GGUF"  # use instead of model_path
        hf_file: "qwen2.5-0.5b-instruct-q4_k_m.gguf"    # optional: specific file
        idle_timeout_seconds: 300
        download_timeout_seconds: 1800  # default: 3600
        max_instances: 4
        llama_server_args: "--alias qwen2.5-0.5b -c 32768 -fa on"

  # ---------------------------------------------------------------------------
  # Embedding model
  # ---------------------------------------------------------------------------
  - name: "nomic-embed"
    description: "Text embedding model"
    profiles:
      - id: "default"
        model_path: "./models/nomic-embed-text-v1.5.Q8_0.gguf"
        idle_timeout_seconds: 300
        max_instances: 2
        llama_server_args: "--alias nomic-embed -c 8192 --embedding --pooling mean"

  # ---------------------------------------------------------------------------
  # Reranking model
  # ---------------------------------------------------------------------------
  - name: "bge-reranker"
    description: "Cross-encoder reranker"
    profiles:
      - id: "default"
        model_path: "./models/bge-reranker-v2-m3-Q8_0.gguf"
        idle_timeout_seconds: 300
        max_instances: 2
        llama_server_args: "--alias bge-reranker -c 8192 --reranking"

  # ---------------------------------------------------------------------------
  # Model with instance-level API key
  # ---------------------------------------------------------------------------
  - name: "protected-model"
    description: "Model with llama-server auth"
    profiles:
      - id: "default"
        model_path: "./models/protected.gguf"
        idle_timeout_seconds: 300
        max_instances: 1
        # proxy auto-includes api-key when forwarding requests
        llama_server_args: "--alias protected-model -c 4096 --api-key instance-secret-key"

  # ---------------------------------------------------------------------------
  # Disabled model (kept for reference)
  # ---------------------------------------------------------------------------
  - name: "deprecated-model"
    enabled: false
    profiles:
      - id: "default"
        model_path: "./models/old-model.gguf"
        idle_timeout_seconds: 60
        llama_server_args: "-c 2048"
