# =============================================================================
# llamesh Configuration
# =============================================================================
# This file configures a single node in the mesh proxy cluster.
# Copy to config.yaml and customize for your environment.

# -----------------------------------------------------------------------------
# Node Identity
# -----------------------------------------------------------------------------

# Unique identifier for this node in the cluster (required)
node_id: "node-a"

# Address and port to listen on (required)
# Use "0.0.0.0:8080" to listen on all interfaces
listen_addr: "0.0.0.0:8080"

# Public URL other nodes/clients use to reach this node (optional)
# If not set, peers will use the address they connected from
public_url: "https://node-a.example.com"

# -----------------------------------------------------------------------------
# Resource Limits
# -----------------------------------------------------------------------------

# Maximum VRAM (GPU memory) in MB this node can use (required).
# Set to your intended llamesh budget. When NVIDIA NVML is available,
# device-wide VRAM used by other processes is counted against this budget
# automatically, so external GPU workloads reduce spawn capacity.
max_vram_mb: 16000  # 16GB

# Maximum system memory in MB this node can use (required)
# Set to available RAM minus OS/other app needs
max_sysmem_mb: 64000  # 64GB

# Maximum number of llama-server instances this node can run (default: 100)
# Must be at least 1: a zero cap means the node can never spawn an instance. A
# forwarding-only node keeps an empty cookbook and leaves this at its default.
max_instances_per_node: 100

# -----------------------------------------------------------------------------
# Model Routing
# -----------------------------------------------------------------------------

# Default model to use when client doesn't specify one (required)
# Format: "model-name" or "model-name:profile"
default_model: "gpt-oss-20b"

# Default limits applied to all models unless overridden in cookbook (required)
model_defaults:
  # Max concurrent requests per llama-server instance
  max_concurrent_requests_per_instance: 8
  # Max requests waiting in queue per model
  max_queue_size_per_model: 64
  # Max instances of same model that can run simultaneously
  max_instances_per_model: 4
  # Max time (ms) request waits in queue before timeout (default: 60000)
  max_wait_in_queue_ms: 60000
  # Max request duration in ms, 0 = unlimited (default: 0)
  max_request_duration_ms: 0
  # Minimum seconds a *busy* instance is protected from being drained for a
  # competing model: an instance with its own requests still queued is not
  # drained for a competitor until it has served this long. An instance that
  # goes idle with an empty queue yields to a waiting competitor immediately,
  # regardless of this value. 0 = never protected. (default: 15)
  min_eviction_tenure_secs: 15

# Global cap on total queued requests across all models, 0 = no global limit
# (only per-model max_queue_size_per_model applies). Bounds overall memory
# pressure from queued requests. (default: 0)
max_total_queue_entries: 0

# Inactivity (read) timeout in ms for outbound requests to a local llama-server.
# A stalled upstream (one that stops sending mid-response) otherwise holds its
# in-flight slot forever, which can hang a graceful drain. It is a per-chunk
# timer (reset on every chunk), so it bounds silence between streamed tokens
# without aborting an actively-streaming generation. DISABLED by default (0): the
# timer also covers the wait for the first body bytes, and a `stream: false`
# response arrives only when generation finishes, so any non-zero value shorter
# than a request's full generation time would abort a legitimate request. Set a
# positive value (e.g. 600000) only if your requests stream tokens regularly.
upstream_read_timeout_ms: 0

# Wedged-instance watchdog. A request whose llama-server accepts it then goes
# silent — flat at ~0% CPU and ~0% GPU while still holding its slot — pins that
# slot forever, stalling graceful drain and idle eviction (the same hang
# upstream_read_timeout_ms bounds per-request). When enabled, a background task
# samples per-process CPU and GPU utilization and, after an instance has shown
# no activity while holding a slot for window_ms, stops it so the stuck request
# errors out and the slot is released. Unlike a timeout it tells a slow-but-
# active generation (CPU/GPU busy) apart from a true hang (both flat), so it
# never aborts legitimate work. Per-process GPU utilization (NVML) is hardware-
# dependent, so the watchdog is opt-in; enable it on nodes that have exhibited
# stuck slots and complement it with upstream_read_timeout_ms. Note: a streaming
# response stays "active" only while its client keeps consuming; raise window_ms
# if you serve very long streams to clients that may pause for many minutes.
wedge_detector:
  enabled: false # (default: false) opt-in; not run at all when disabled
  window_ms: 600000 # (default: 600000) sustained no-activity time before a kill
  sample_interval_ms: 5000 # (default: 5000) how often activity is sampled
  # Assert this node runs inference on CPU only (no GPU of any vendor). Only then
  # is idle CPU, with no NVIDIA/NVML GPU present, treated as a wedge. Leave false
  # on any node with a GPU — including non-NVIDIA GPUs (Metal/ROCm/Vulkan) whose
  # activity NVML cannot see — so a healthy GPU decode is never wrongly flagged.
  cpu_only: false # (default: false)

# -----------------------------------------------------------------------------
# llama-server Port Allocation
# -----------------------------------------------------------------------------

# Constrain which ports llama-server instances can bind to (optional)
# If omitted, uses OS-assigned ephemeral ports
llama_cpp_ports:
  # Explicit list of allowed ports
  ports: [8200, 8201, 8300]
  # Port ranges (inclusive)
  ranges:
    - start: 8200
      end: 8299

# -----------------------------------------------------------------------------
# llama.cpp Build Management
# -----------------------------------------------------------------------------

llama_cpp:
  # Git repository URL
  repo_url: "https://github.com/ggml-org/llama.cpp.git"

  # Local paths (defaults shown)
  repo_path: "./llama.cpp"
  build_path: "./llama.cpp/build"
  binary_path: "./llama.cpp/bin/llama-server"

  # Branch, tag, or commit to build
  # Use release tags (e.g., "b6115") for stability, "master" for latest
  branch: "master"

  # CMake build arguments (default: CUDA enabled)
  build_args:
    - "-DGGML_CUDA=ON"
    - "-DGGML_CUDA_FA_ALL_QUANTS=ON"
    # Other options:
    # - "-DGGML_METAL=ON"       # macOS Metal
    # - "-DGGML_VULKAN=ON"      # Vulkan
    # - "-DGGML_HIPBLAS=ON"     # AMD ROCm
    # - "-DGGML_SYCL=ON"        # Intel oneAPI

  # Additional args passed to build command (e.g., make/ninja)
  build_command_args: ["-j"]  # Parallel build

  # Auto-update interval in seconds, 0 = disabled (required)
  auto_update_interval_seconds: 86400  # Daily

  # Enable/disable build management (default: true)
  # Set to false if managing llama.cpp builds externally
  enabled: true

  # Number of previous builds to keep for rollback, besides the one currently
  # in use (default: 3). The active build is always kept in addition, so a
  # value of 0 keeps only the active build.
  keep_builds: 3

# -----------------------------------------------------------------------------
# Cluster Configuration
# -----------------------------------------------------------------------------

cluster:
  # Enable cluster mode to mesh multiple nodes (required)
  enabled: true

  # Gossip interval - how often nodes exchange state (required)
  gossip_interval_seconds: 5

  # Max concurrent outbound gossip connections (default: 16)
  max_concurrent_gossip: 16

  # What to do when a peer reports a different llamesh version (default: "warn")
  #   "warn"         - log the mismatch, keep meshing
  #   "reject_major" - refuse to mesh with peers on a different major version
  #   "reject_any"   - refuse to mesh with peers on any different version
  version_mismatch_action: "warn"

  # Peer discovery configuration
  discovery:
    # Enable mDNS for zero-config LAN discovery (default: true)
    # Note: mDNS uses UDP multicast on port 5353. If firewalled, use explicit peers below.
    mdns: true
    # mDNS service name (default: "_llama-mesh._tcp.local")
    service_name: "_llama-mesh._tcp.local"

  # Explicit peer addresses for WAN or cross-subnet connections
  # Additive with mDNS - both methods contribute peers
  # Uses same port as listen_addr (single-port protocol multiplexing)
  peers:
    - "node-b.example.com:8080"
    - "node-c.example.com:8080"

  # Noise Protocol encryption for inter-node traffic
  noise:
    # Enable Noise Protocol (default: true)
    enabled: true

    # Trust-On-First-Use: auto-accept new peer keys (default: true)
    # Set to false for enterprise deployments with pinned keys
    tofu: true

    # Directory for secrets (default: ~/.llama-mesh/)
    # Contains: cluster_token, node.key, known_peers
    config_dir: "~/.llama-mesh/"

    # Override paths for specific files (optional)
    # private_key_path: "/path/to/node.key"
    # known_peers_path: "/path/to/known_peers"
    # previous_key_path: "/path/to/old-node.key"  # For key rotation

    # Enterprise: only accept connections from these public keys
    # Format: "noise25519:<base64-encoded-key>"
    # If non-empty, TOFU is effectively disabled
    allowed_keys: []
      # - "noise25519:xAbC123...="
      # - "noise25519:yDeF456...="

    # Session cache TTL in seconds (default: 3600)
    session_ttl_seconds: 3600

  # Circuit breaker for peer connections
  # Prevents cascading failures by temporarily blocking requests to unhealthy peers
  circuit_breaker:
    # Enable circuit breaker (default: true)
    enabled: true
    # Number of consecutive failures before opening circuit (default: 5, must be > 0)
    failure_threshold: 5
    # Number of successes in half-open state to close circuit (default: 2, must be > 0)
    success_threshold: 2
    # Base backoff duration in ms when circuit opens
    # (default: 5000, must be > 0 and <= open_duration_max_ms)
    open_duration_base_ms: 5000
    # Max backoff duration in ms with exponential backoff (default: 60000, must be > 0)
    open_duration_max_ms: 60000
    # Minimum interval in ms between recovery probes once an open circuit's
    # backoff has elapsed; limits traffic to a recovering peer until the
    # circuit closes. 0 disables probe gating. (default: 1000)
    half_open_probe_interval_ms: 1000

# -----------------------------------------------------------------------------
# HTTP Server Settings
# -----------------------------------------------------------------------------

http:
  # Max request body size in bytes (required; must be > 0 — a 0 limit rejects
  # every request that carries a body)
  request_body_limit_bytes: 1048576  # 1MB

  # Idle connection timeout in seconds (required; must be > 0 — a 0 timeout tears
  # down connections the moment they go idle, defeating keep-alive)
  idle_timeout_seconds: 120

  # Timeout in ms for reading a request body (default: 30000; must be > 0 — a 0
  # timeout elapses immediately, so every body read times out)
  body_read_timeout_ms: 30000

  # Timeout in ms for protocol detection on a new connection, before any bytes
  # arrive (TLS vs HTTP vs cluster traffic). (default: 10000; must be > 0)
  protocol_detect_timeout_ms: 10000

# -----------------------------------------------------------------------------
# Shutdown Behavior
# -----------------------------------------------------------------------------

# Grace period for in-flight requests during shutdown (default: 30)
shutdown_grace_period_seconds: 30

# Max hops for request forwarding to prevent loops (default: 10)
max_hops: 10

# Path for metrics JSON snapshot (default: "./node-metrics.json")
metrics_path: "./node-metrics.json"

# -----------------------------------------------------------------------------
# File Logging (optional)
# -----------------------------------------------------------------------------

# Enable file logging with daily rotation and gzip compression.
# Logs are written to both console (always) and file (when enabled).
# logging:
#   enabled: true              # Enable file logging (default: false)
#   directory: "./logs"        # Log directory (default: "./logs")
#   filename: "proxy.log"      # Log filename (default: "proxy.log")
#   max_keep_files: 7          # Rotated files to keep (default: 7)
#   compression: true          # Gzip compress rotated files (default: true)

# -----------------------------------------------------------------------------
# API Authentication (optional)
# -----------------------------------------------------------------------------

auth:
  enabled: true
  # Header name for API key (case-insensitive matching)
  required_header: "x-api-key"
  # List of valid API keys
  allowed_keys:
    - "my-secret-key-1"
    - "my-secret-key-2"

# -----------------------------------------------------------------------------
# TLS Configuration (optional)
# -----------------------------------------------------------------------------

# TLS for public API (client → proxy)
server_tls:
  enabled: false
  cert_path: "./tls/server.crt"
  key_path: "./tls/server.key"

# DEPRECATED: mTLS for inter-node traffic
# Use cluster.noise instead (Noise Protocol)
# cluster_tls:
#   enabled: false
#   ca_cert_path: "./tls/ca.crt"
#   client_cert_path: "./tls/node-a.crt"
#   client_key_path: "./tls/node-a.key"
